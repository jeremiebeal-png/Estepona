<script>
  const burgerBtn = document.querySelector('.burger');
  const mobileMenu = document.getElementById('mobileMenu');
  let backdropEl;

  function openMenu(){
    if(!mobileMenu) return;
    mobileMenu.hidden = false;
    burgerBtn?.setAttribute('aria-expanded','true');

    backdropEl = document.createElement('div');
    backdropEl.className = 'mobile-backdrop';
    backdropEl.addEventListener('click', closeMenu);
    document.body.appendChild(backdropEl);

    document.body.style.overflow = 'hidden';
  }

  function closeMenu(){
    if(!mobileMenu) return;
    mobileMenu.hidden = true;
    burgerBtn?.setAttribute('aria-expanded','false');
    backdropEl?.remove();
    document.body.style.overflow = '';
  }

  burgerBtn?.addEventListener('click', () => {
    const open = burgerBtn.getAttribute('aria-expanded') === 'true';
    open ? closeMenu() : openMenu();
  });

  document.addEventListener('keydown', e => {
    if(e.key === 'Escape' && !mobileMenu.hidden) closeMenu();
  });


  const medias = [
    { title:"Ronda", file:"images/villes/ronda.jpeg" },
    { title:"Ronda", file:"images/villes/ronda1.jpeg" },
    { title:"Ronda", file:"images/villes/ronda2.jpeg" },
    { title:"Ronda", file:"images/villes/ronda3.jpeg" },
    { title:"Ronda", file:"images/villes/ronda45.jpeg" },
    { title:"Ronda", file:"images/villes/ronda10.jpeg" },
    { title:"Ronda", file:"images/villes/ronda11.jpeg" },
    { title:"Ronda", file:"images/villes/ronda12.jpeg" },
    { title:"Ronda", file:"images/villes/ronda13.jpeg" },
    { title:"Ronda", file:"images/villes/ronda14.jpeg" },
    { title:"Ronda", file:"images/villes/ronda15.jpeg" },
    { title:"Ronda", file:"images/villes/ronda16.jpeg" },
    { title:"Ronda", file:"images/villes/ronda17.jpeg" },
    { title:"Ronda", file:"images/villes/ronda18.jpeg" },
    { title:"Ronda", file:"images/villes/ronda19.jpeg" },
    { title:"Ronda", file:"images/villes/ronda20.jpeg" },
    { title:"Ronda", file:"images/villes/ronda21.jpeg" },
    { title:"Ronda", file:"images/villes/ronda22.jpeg" },
    { title:"Ronda", file:"images/villes/ronda23.jpeg" },
    { title:"Ronda", file:"images/villes/ronda24.jpeg" },
    { title:"Ronda", file:"images/villes/ronda25.jpeg" },
    { title:"Ronda", file:"images/villes/ronda26.jpeg" },
    { title:"Ronda", file:"images/villes/ronda27.jpeg" },
    { title:"Ronda", file:"images/villes/ronda28.jpeg" },
    { title:"Ronda", file:"images/villes/ronda29.jpeg" },
    { title:"Ronda", file:"images/villes/ronda30.jpeg" },
    { title:"Ronda", file:"images/villes/ronda31.jpeg" },
    { title:"Ronda", file:"images/villes/ronda32.jpeg" },
    { title:"Ronda", file:"images/villes/ronda33.jpeg" },
    { title:"Ronda", file:"images/villes/ronda34.jpeg" },
    { title:"Ronda", file:"images/villes/ronda35.jpeg" },
    { title:"Ronda", file:"images/villes/ronda36.jpeg" },
    { title:"Ronda", file:"images/villes/ronda38.jpeg" },
    { title:"Ronda", file:"images/villes/ronda39.jpeg" },
    { title:"Ronda", file:"images/villes/ronda40.jpeg" },
    { title:"Ronda", file:"images/villes/ronda41.jpeg" },
    { title:"Ronda", file:"images/villes/ronda42.jpeg" },
    { title:"Ronda", file:"images/villes/ronda43.jpeg" },
    { title:"Ronda", file:"images/villes/ronda44.jpeg" },

    /* Exemple vidéo :
    { title:"Vidéo de Ronda", file:"images/villes/ronda-video.mp4" },
    */
  ];

  function escapeHtml(str){
    return (str ?? "").toString()
      .replaceAll("&","&amp;")
      .replaceAll("<","&lt;")
      .replaceAll(">","&gt;")
      .replaceAll('"',"&quot;")
      .replaceAll("'","&#039;");
  }

  function isVideo(file){
    return /\.(mp4|webm|ogg|mov)$/i.test(file);
  }

  const lb = document.getElementById("lightbox");
  const lbImg = document.getElementById("lightboxImg");
  const lbCaption = document.getElementById("lightboxCaption");
  const lbClose = document.getElementById("lightboxClose");

  let lbVideo = document.createElement("video");
  lbVideo.id = "lightboxVideo";
  lbVideo.controls = true;
  lbVideo.playsInline = true;
  lbVideo.style.width = "100%";
  lbVideo.style.maxHeight = "calc(100vh - 48px)";
  lbVideo.style.display = "none";
  lbVideo.style.background = "rgba(0,0,0,.25)";

  lbImg.insertAdjacentElement("afterend", lbVideo);

  function openLightbox(src, alt, caption){
    const video = isVideo(src);

    lbImg.style.display = video ? "none" : "block";
    lbVideo.style.display = video ? "block" : "none";

    lbImg.src = "";
    lbVideo.pause();
    lbVideo.removeAttribute("src");
    lbVideo.load();

    if(video){
      lbVideo.src = src;
      lbVideo.load();
    }else{
      lbImg.src = src;
      lbImg.alt = alt || "";
    }

    lbCaption.textContent = caption || "";
    lb.classList.add("open");
    document.body.style.overflow = "hidden";
  }

  function closeLightbox(){
    lb.classList.remove("open");

    lbImg.src = "";
    lbVideo.pause();
    lbVideo.removeAttribute("src");
    lbVideo.load();

    document.body.style.overflow = "";
  }

  lbClose.addEventListener("click", closeLightbox);

  lb.addEventListener("click", e => {
    if(e.target === lb) closeLightbox();
  });

  document.addEventListener("keydown", e => {
    if(e.key === "Escape") closeLightbox();
  });

  const gallery = document.getElementById("gallery");

  for(const media of medias){
    const el = document.createElement("div");
    el.className = "thumb";
    el.setAttribute("data-file", media.file);
    el.setAttribute("data-alt", media.title);
    el.setAttribute("data-cap", media.title);

    if(isVideo(media.file)){
      el.innerHTML = `
        <video muted playsinline preload="metadata">
          <source src="${escapeHtml(media.file)}" type="video/mp4">
        </video>
        <span style="
          position:absolute;
          inset:auto 12px 12px auto;
          padding:8px 10px;
          border-radius:999px;
          background:rgba(0,0,0,.55);
          color:white;
          font-size:12px;
          border:1px solid rgba(255,255,255,.18);
        ">▶ Vidéo</span>
      `;
    }else{
      el.innerHTML = `<img src="${escapeHtml(media.file)}" alt="${escapeHtml(media.title)}" loading="lazy" />`;
    }

    gallery.appendChild(el);

    const img = el.querySelector("img");
    const video = el.querySelector("video");

    function showPlaceholder(){
      el.classList.add("placeholder");
      el.removeAttribute("data-file");
      el.removeAttribute("data-alt");
      el.removeAttribute("data-cap");
      el.innerHTML = `
        <div class="ph">
          <div class="tag">Média à ajouter</div>
          <div>${escapeHtml(media.title)}</div>
        </div>
      `;
    }

    img?.addEventListener("error", showPlaceholder);
    video?.addEventListener("error", showPlaceholder);

    el.addEventListener("click", () => {
      const src = el.getAttribute("data-file");
      if(!src) return;

      const alt = el.getAttribute("data-alt") || "";
      const cap = el.getAttribute("data-cap") || "";

      openLightbox(src, alt, cap);
    });
  }
</script>
