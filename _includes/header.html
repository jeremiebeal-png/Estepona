<style>
    nav.primary{position:relative}
    .dropdown{position:relative;display:inline-block}
    .dropdown-toggle{
      display:inline-flex;align-items:center;gap:6px;
      padding:8px 12px;border-radius:999px;border:1px solid transparent;
      background:transparent;color:inherit;font:inherit;cursor:pointer;
    }
    .dropdown-toggle:hover{border-color:var(--color-border);background:rgba(255,255,255,.04)}
    .dropdown-toggle .chev{width:11px;height:11px;transition:transform .15s ease}
    .dropdown-toggle[aria-expanded="true"] .chev{transform:rotate(180deg)}

    .dropdown-menu{
      position:absolute;top:calc(100% + 8px);left:0;min-width:200px;
      display:none;flex-direction:column;gap:2px;padding:8px;
      background:var(--glass-strong);backdrop-filter:blur(14px) saturate(140%);
      -webkit-backdrop-filter:blur(14px) saturate(140%);
      border:1px solid var(--glassLine);border-radius:var(--radius-md);
      box-shadow:var(--shadow);z-index:60;
    }
    .dropdown-menu.open{display:flex}
    .dropdown-menu a{padding:9px 12px;border-radius:8px;white-space:nowrap}
    .dropdown-menu a:hover{background:rgba(255,255,255,.06)}

    .mobile-nav-label{
      margin-top:10px;padding:6px 4px 2px;
      font-size:12px;letter-spacing:.04em;text-transform:uppercase;
      color:var(--color-muted);
    }
    .mobile-nav-label:first-child{margin-top:0}
  </style>

          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M7.5 2h9A5.5 5.5 0 0 1 22 7.5v9A5.5 5.5 0 0 1 16.5 22h-9A5.5 5.5 0 0 1 2 16.5v-9A5.5 5.5 0 0 1 7.5 2Z" stroke="currentColor" stroke-width="1.7"/>

        <a href="https://www.youtube.com/@Vivre_a_Estepona" target="_blank" rel="noopener noreferrer" aria-label="YouTube Vivre à Estepona">

        </svg>
