<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gastronomie internationale — Marbella</title>
<meta name="description" content="Découvrez la gastronomie internationale à Marbella : cuisines du monde et restaurants inspirants." />
<meta name="theme-color" content="#0b3c49" />

<style>

:root{
--color-bg:#0b3c49;
--color-surface:#0f4b59;
--color-text:#eaf6f8;
--color-muted:rgba(234,246,248,.75);
--color-border:rgba(234,246,248,.14);
--color-accent:#9fe7f5;
--radius:16px;
--shadow:0 18px 50px rgba(0,0,0,.25);
--maxw:1100px;
}

body{
margin:0;
font-family:system-ui,-apple-system,Segoe UI,Roboto,Inter,Arial,sans-serif;
background:var(--color-bg);
color:var(--color-text);
}

.wrap{
max-width:var(--maxw);
margin:0 auto;
padding:18px 16px 56px;
}

.surface{
background:color-mix(in srgb, var(--color-surface) 86%, transparent);
border:1px solid var(--color-border);
border-radius:var(--radius);
box-shadow:var(--shadow);
overflow:hidden;
}

header{
padding:18px 18px 0;
}

.hero{
padding:18px 0 10px;
}

.hero h1{
margin:10px 0 8px;
font-size:38px;
}

.hero p{
margin:0;
color:var(--color-muted);
line-height:1.6;
}

.grid{
display:grid;
grid-template-columns:repeat(12,1fr);
gap:12px;
padding:20px;
}

.card{
grid-column:span 6;
border-radius:14px;
overflow:hidden;
border:1px solid var(--color-border);
background:color-mix(in srgb, var(--color-bg) 55%, transparent);
position:relative;
min-height:190px;
cursor:pointer;
}

.card img{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

@media(max-width:860px){
.card{grid-column:span 12;}
}

/* LIGHTBOX */

.lightbox{
position:fixed;
inset:0;
background:rgba(0,0,0,.92);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
cursor:zoom-out;
}

.lightbox img{
max-width:92%;
max-height:92%;
border-radius:12px;
box-shadow:0 20px 60px rgba(0,0,0,.6);
}

.lightbox.active{
display:flex;
}

</style>
</head>

<body>

<div class="wrap">

<div class="surface">

<header>

<div style="display:flex;gap:16px">
<a href="/">Accueil</a>
<a href="#">Restaurants</a>
<a href="#">Bars</a>
<a href="#">Contact</a>
</div>

<div class="hero">
<h1>Marbella</h1>

<p>
Marbella est une destination incontournable de la Costa del Sol, connue pour ses plages, 
son climat ensoleillé et sa gastronomie internationale. Découvrez une sélection d’ambiances 
culinaires venues du monde entier.
</p>

</div>

</header>

<div class="grid">

<div class="card"><img src="https://images.unsplash.com/photo-1555396273-367ea4eb4db5?auto=format&fit=crop&w=1200&q=80"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1540189549336-e6e99c3679fe?auto=format&fit=crop&w=1200&q=80"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=1200&q=80"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1526318896980-cf78c088247c?auto=format&fit=crop&w=1200&q=80"></div>

<div class="card"><img src="https://images.unsplash.com/photo-1514511547117-fd6c1e8f3b45?auto=format&fit=crop&w=1200&q=80"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1559339352-11d035aa65de?auto=format&fit=crop&w=1200&q=80"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1529692236671-f1f6cf9683ba?auto=format&fit=crop&w=1200&q=80"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1529694157877-ec19a9a8b61d?auto=format&fit=crop&w=1200&q=80"></div>

<div class="card"><img src="https://images.unsplash.com/photo-1511690743698-d9d85f2fbf38?auto=format&fit=crop&w=1200&q=80"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1520201163981-8cc95007dd2a?auto=format&fit=crop&w=1200&q=80"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?auto=format&fit=crop&w=1200&q=80"></div>
<div class="card"><img src="https://images.unsplash.com/photo-1481833761820-0509d3217039?auto=format&fit=crop&w=1200&q=80"></div>

</div>

</div>
</div>

<!-- LIGHTBOX -->

<div class="lightbox" id="lightbox">
<img src="">
</div>

<script>

const lightbox = document.getElementById('lightbox');
const lightboxImg = lightbox.querySelector('img');

document.querySelectorAll('.card img').forEach(img => {

img.addEventListener('click', () => {

lightboxImg.src = img.src;

lightbox.classList.add('active');

});

});

lightbox.addEventListener('click', () => {

lightbox.classList.remove('active');

});

</script>

</body>
</html>
