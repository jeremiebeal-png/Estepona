  <!-- SCRIPT PRINCIPAL -->
  <script>
    (function(){
      const dataEl  = document.getElementById("dataset-chiringuitos");
      const grid    = document.getElementById("grid");

      if(!dataEl || !grid){
        console.error("Erreur : élément manquant");
        return;
      }

      let items = [];
      try { items = JSON.parse(dataEl.textContent.trim()); }
      catch(e){ console.error("Erreur JSON", e); items = []; }

      function detectZone(quartier){
        const s = (quartier || "").toLowerCase();
        if(s.includes("cristo")) return "Cristo";
        if(s.includes("natura")) return "Natura";
        if(s.includes("rada")) return "Rada";
        if(s.includes("port")) return "Port";
        if(s.includes("benamara") || s.includes("saladillo")) return "Benamara";
        if(s.includes("villacana")) return "Villacana";
        if(s.includes("guadalmansa") || s.includes("guadalmina") || s.includes("castor")) return "Benamara";
        if(s.includes("centre") || s.includes("centro")) return "Rada";
        return "Autre";
      }

      items = items.map(it => ({ ...it, zone: it.zone || detectZone(it.quartier) }));

      function esc(s){
        return String(s ?? "")
          .replaceAll("&","&amp;")
          .replaceAll("<","&lt;")
          .replaceAll(">","&gt;")
          .replaceAll('"',"&quot;")
          .replaceAll("'","&#039;");
      }

      function render(list){
        grid.innerHTML = list.map(it => `
          <article class="card">
            <a class="thumb" href="${esc(it.maps)}" target="_blank" rel="noopener">
              <img src="${esc(it.image)}" alt="${esc(it.nom)}">
            </a>
            <div class="body">
              <div class="kicker">
                <span class="tag">${esc(it.zone)}</span> · ${esc(it.quartier)} · <span class="tag">${esc(it.categorie)}</span>
              </div>
              <h3>${esc(it.nom)}</h3>
              <div class="meta" aria-label="Tags">
                ${(it.tags || []).map(t => `<span class="tag">${esc(t)}</span>`).join("")}
              </div>
              <div class="meta" style="margin-top:8px">
                Adresse : ${esc(it.adresse)} · <a href="${esc(it.maps)}" target="_blank" rel="noopener">Voir sur Maps</a>
              </div>
              ${it.note ? `<div class="meta" style="margin-top:8px">${esc(it.note)}</div>` : ``}
            </div>
          </article>
        `).join("");
      }

      // Menu mobile (même logique que index.html)
      const burger = document.querySelector('.burger');
      const mobile = document.getElementById('mobileMenu');
      let backdrop;

      function openMenu(){
        if(!mobile) return;
        mobile.hidden = false;
        burger?.setAttribute('aria-expanded','true');
        backdrop = document.createElement('div');
        backdrop.className = 'mobile-backdrop';
        backdrop.addEventListener('click', closeMenu);
        document.body.appendChild(backdrop);
        document.body.style.overflow='hidden';
      }
      function closeMenu(){
        if(!mobile) return;
        mobile.hidden = true;
        burger?.setAttribute('aria-expanded','false');
        backdrop?.remove();
        document.body.style.overflow='';
      }

      burger?.addEventListener('click',()=>{
        const open = burger.getAttribute('aria-expanded')==='true';
        open ? closeMenu() : openMenu();
      });
      document.addEventListener('keydown',e=>{
        if(e.key==='Escape' && mobile && !mobile.hidden) closeMenu();
      });

      // Init
      render(items);
    })();
  </script>
</body>
</html>
