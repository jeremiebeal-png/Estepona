<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>Orquidario — Vivre à Estepona</title>

  <style>
    :root{
      --sea1:#0b3c49;
      --sea2:#0ea5e9;
      --sea3:#2dd4bf;

      --panel:#071a22;
      --panelLine: rgba(234,246,248,.10);

      --textOn:#eaf6f8;
      --mutedOn: rgba(234,246,248,.74);

      --radius:18px;
      --shadow:0 14px 40px rgba(10, 30, 35, .18);

      --glass: rgba(10, 22, 36, .55);
      --glass-strong: rgba(10, 22, 36, .82);
      --glassLine: rgba(234,246,248,.14);

      --color-border: #1a2d5a;

      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    *{
      box-sizing:border-box;
    }

    body{
      margin:0;
      font-family:var(--sans);
      color:var(--textOn);

      background:
        radial-gradient(1000px 700px at 20% 0%, rgba(45,212,191,.28) 0%, rgba(45,212,191,0) 55%),
        radial-gradient(900px 650px at 90% 10%, rgba(14,165,233,.30) 0%, rgba(14,165,233,0) 60%),
        linear-gradient(180deg, rgba(11,60,73,1) 0%, rgba(10,85,125,1) 45%, rgba(7,26,34,1) 100%);

      min-height:100vh;
    }

    a{
      color:inherit;
      text-decoration:none;
    }

    img{
      max-width:100%;
      display:block;
    }

    .container{
      width:min(1200px,92vw);
      margin-inline:auto;
    }

    /* HEADER */
    header{
      position: sticky;
      top: 0;
      z-index: 80;

      background: var(--glass);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);

      border-bottom: 1px solid var(--glassLine);
    }

    .header-row{
      display:flex;
      align-items:center;
      gap:22px;
      padding:16px 0;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:12px;
    }

    .brand-logo{
      width:44px;
      height:44px;
      border-radius:12px;
      overflow:hidden;
      border:1px solid var(--color-border);
      background:#fff;
    }

    nav.primary{
      margin-left:auto;
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    nav.primary a{
      padding:8px 12px;
      border-radius:999px;
    }

    nav.primary a:hover{
      background:rgba(255,255,255,.06);
    }

    .page{
      padding:22px 0 40px;
    }

    .hero{
      margin:14px 0 20px;
      padding:20px;
      border-radius: var(--radius);

      background: linear-gradient(180deg, rgba(7,26,34,.92), rgba(6,22,29,.88));

      border: 1px solid var(--panelLine);
      box-shadow: var(--shadow);
    }

    .title{
      margin:0;
      font-size:32px;
    }

    .sub{
      margin:10px 0 0;
      color:var(--mutedOn);
      font-size:14px;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(3, 1fr);
      gap:16px;
    }

    .mural{
      border-radius:18px;
      overflow:hidden;

      background: rgba(7,26,34,.95);

      border:1px solid var(--panelLine);

      box-shadow:0 10px 24px rgba(10,30,35,.16);
    }

    .thumb{
      width:100%;
      aspect-ratio:16/10;

      overflow:hidden;
      cursor:pointer;
      background:#06161d;
    }

    .thumb img{
      width:100%;
      height:100%;
      object-fit:cover;

      transition:transform .25s ease;
    }

    .thumb:hover img{
      transform:scale(1.06);
    }

    .placeholder{
      display:flex;
      align-items:center;
      justify-content:center;
      min-height:220px;

      color:rgba(234,246,248,.7);
      font-size:14px;
    }

    /* LIGHTBOX */
    .lightbox{
      position:fixed;
      inset:0;

      display:none;
      align-items:center;
      justify-content:center;

      background:rgba(0,0,0,.82);

      z-index:9999;
      padding:24px;
    }

    .lightbox.open{
      display:flex;
    }

    .lightbox-inner{
      position:relative;
      width:min(1200px,100%);
      max-height:100%;
    }

    .lightbox-inner img{
      width:100%;
      max-height:90vh;
      object-fit:contain;

      border-radius:18px;
    }

    .lightbox-close{
      position:absolute;
      top:12px;
      right:12px;

      border:none;
      border-radius:999px;

      padding:10px 14px;

      background:rgba(0,0,0,.55);

      color:#fff;
      cursor:pointer;
      font-size:14px;
    }

    @media (max-width:900px){
      .grid{
        grid-template-columns:repeat(2,1fr);
      }
    }

    @media (max-width:640px){
      .grid{
        grid-template-columns:1fr;
      }

      .title{
        font-size:24px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="container header-row">

    <a class="brand" href="index.html">
      <span class="brand-logo">
        <img src="img/logo_bon_plan_estepona.png" alt="">
      </span>

      <strong>Vivre à Estepona</strong>
    </a>

    <nav class="primary">
      <a href="index.html#manger">Restaurants</a>
      <a href="index.html#itin">Que faire</a>
      <a href="transport-estepona.html">Transport</a>
      <a href="ecoles.html">Écoles</a>
      <a href="sante.html">Santé</a>
      <a href="trafic.html">Trafic</a>
      <a href="contact.html">Contact</a>
    </nav>

  </div>
</header>

<main class="container page">

  <section class="hero">
    <h1 class="title">Orquidario d’Estepona</h1>

    <p class="sub">
      Clique sur une photo pour l’ouvrir en grand.
    </p>
  </section>

  <div id="cards" class="grid"></div>

</main>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">

  <div class="lightbox-inner">

    <button class="lightbox-close" id="lightboxClose">
      ✕ Fermer
    </button>

    <img id="lightboxImg" alt="">

  </div>

</div>

<script>

  const IMAGE_BASE = "/images/villes/";
  const IMAGE_EXT = ".jpg";
  const TOTAL_PHOTOS = 25;

  function imgFor(n){
    return IMAGE_BASE + "orqui" + n + IMAGE_EXT;
  }

  const cards = document.getElementById("cards");

  for(let i = 1; i <= TOTAL_PHOTOS; i++){

    const photo = imgFor(i);

    const el = document.createElement("article");

    el.className = "mural";

    el.innerHTML = `
      <div class="thumb" data-img="${photo}">
        <img src="${photo}" alt="Photo ${i}" loading="lazy">
      </div>
    `;

    cards.appendChild(el);

    const thumb = el.querySelector(".thumb");
    const img = el.querySelector("img");

    img.addEventListener("error", ()=>{

      thumb.classList.add("placeholder");

      thumb.innerHTML = `
        <div>
          Photo manquante<br>
          orqui${i}.jpg
        </div>
      `;
    });

    thumb.addEventListener("click", ()=>{

      const src = thumb.getAttribute("data-img");

      if(!src) return;

      openLightbox(src);
    });
  }

  // LIGHTBOX
  const lb = document.getElementById("lightbox");
  const lbImg = document.getElementById("lightboxImg");
  const lbClose = document.getElementById("lightboxClose");

  function openLightbox(src){

    lbImg.src = src;

    lb.classList.add("open");

    document.body.style.overflow = "hidden";
  }

  function closeLightbox(){

    lb.classList.remove("open");

    lbImg.src = "";

    document.body.style.overflow = "";
  }

  lbClose.addEventListener("click", closeLightbox);

  lb.addEventListener("click", (e)=>{

    if(e.target === lb){
      closeLightbox();
    }
  });

  document.addEventListener("keydown", (e)=>{

    if(e.key === "Escape"){
      closeLightbox();
    }
  });

</script>

</body>
</html>
